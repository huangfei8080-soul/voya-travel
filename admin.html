<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Voya Travel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Admin-specific styles */
    body { background: #f0f2f5; }

    .admin-header {
      background: #0B9BAE;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .admin-header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .admin-header a {
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    .admin-header a:hover { opacity: 1; }

    .admin-tabs {
      display: flex;
      gap: 4px;
      background: #fff;
      padding: 0 24px;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 55px;
      z-index: 99;
    }
    .admin-tab {
      padding: 14px 24px;
      border: none;
      background: none;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: #6b7280;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .admin-tab:hover { color: #0B9BAE; }
    .admin-tab.active {
      color: #0B9BAE;
      border-bottom-color: #0B9BAE;
    }

    .admin-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .admin-section { display: none; }
    .admin-section.active { display: block; }

    .section-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .section-toolbar h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1b1b2f;
    }

    /* Form */
    .admin-form {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }
    .admin-form h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.1rem;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .form-row--3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-row--full { grid-template-columns: 1fr; }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-field label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
    }
    .form-field input,
    .form-field select,
    .form-field textarea {
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus {
      outline: none;
      border-color: #0B9BAE;
      box-shadow: 0 0 0 3px rgba(11,155,174,0.1);
    }
    .form-field textarea { resize: vertical; min-height: 80px; }

    /* Image upload */
    .image-upload {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .image-upload img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
    .image-upload input[type="file"] {
      font-size: 0.85rem;
    }
    .image-upload .url-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    /* Buttons */
    .btn-save {
      background: #0B9BAE;
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save:hover { background: #098696; }

    .btn-cancel {
      background: #e5e7eb;
      color: #374151;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-cancel:hover { background: #d1d5db; }

    .btn-add {
      background: #0B9BAE;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }
    .btn-add:hover { background: #098696; }

    /* Item list table */
    .item-list {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .item-row {
      display: grid;
      grid-template-columns: 80px 1fr auto auto auto auto;
      gap: 16px;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.15s;
    }
    .item-row:hover { background: #f9fafb; }
    .item-row:last-child { border-bottom: none; }
    .item-row img {
      width: 64px;
      height: 48px;
      object-fit: cover;
      border-radius: 6px;
    }
    .item-row .item-info h4 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1b1b2f;
      margin: 0;
    }
    .item-row .item-info p {
      font-size: 0.82rem;
      color: #6b7280;
      margin: 2px 0 0;
    }
    .item-row .item-price {
      font-weight: 700;
      color: #0B9BAE;
      font-size: 0.95rem;
    }
    .item-row .item-badge {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 600;
      background: #e0f7fa;
      color: #0B9BAE;
    }
    .btn-edit, .btn-delete {
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-edit {
      background: #e0f7fa;
      color: #0B9BAE;
    }
    .btn-edit:hover { background: #b2ebf2; }
    .btn-delete {
      background: #fee2e2;
      color: #dc2626;
    }
    .btn-delete:hover { background: #fecaca; }

    .empty-list {
      text-align: center;
      padding: 48px;
      color: #9ca3af;
      font-size: 0.95rem;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #0B9BAE;
      color: #fff;
      padding: 14px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 9999;
    }
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    .toast.error { background: #dc2626; }

    @media (max-width: 768px) {
      .form-row, .form-row--3 { grid-template-columns: 1fr; }
      .item-row { grid-template-columns: 64px 1fr; gap: 8px; }
      .item-row .item-price,
      .item-row .item-badge,
      .item-row .btn-edit,
      .item-row .btn-delete { grid-column: 2; }
    }
  </style>
</head>
<body>

  <!-- Admin Header -->
  <div class="admin-header">
    <h1>
      <img src="images/voya-logo.png" alt="Voya Travel" style="height:32px;filter:brightness(0) invert(1);">
      Admin Panel
    </h1>
    <a href="index.html">&larr; Back to Website</a>
  </div>

  <!-- Tabs -->
  <div class="admin-tabs">
    <button class="admin-tab active" data-tab="products">Products</button>
    <button class="admin-tab" data-tab="promotions">Promotions</button>
    <button class="admin-tab" data-tab="destinations">Destinations</button>
    <button class="admin-tab" data-tab="journal">Journal</button>
    <button class="admin-tab" data-tab="about">About Us</button>
    <button class="admin-tab" data-tab="settings">Settings</button>
  </div>

  <!-- Content -->
  <div class="admin-content">

    <!-- Products Section -->
    <div class="admin-section active" id="section-products">
      <div class="section-toolbar">
        <h2>Products (Latest Trips)</h2>
        <button class="btn-add" onclick="showProductForm()">+ Add Product</button>
      </div>
      <div id="product-form-container"></div>
      <div class="item-list" id="product-list"></div>
    </div>

    <!-- Promotions Section -->
    <div class="admin-section" id="section-promotions">
      <div class="section-toolbar">
        <h2>Promotions (Deals)</h2>
        <button class="btn-add" onclick="showPromoForm()">+ Add Promotion</button>
      </div>
      <div id="promo-form-container"></div>
      <div class="item-list" id="promo-list"></div>
    </div>

    <!-- Destinations Section -->
    <div class="admin-section" id="section-destinations">
      <div class="section-toolbar">
        <h2>Popular Destinations</h2>
        <button class="btn-add" onclick="showDestinationForm()">+ Add Destination</button>
      </div>
      <div id="destination-form-container"></div>
      <div class="item-list" id="destination-list"></div>
    </div>

    <!-- Journal Section -->
    <div class="admin-section" id="section-journal">
      <div class="section-toolbar">
        <h2>Travel Journal</h2>
        <button class="btn-add" onclick="showJournalForm()">+ Add Article</button>
      </div>
      <div id="journal-form-container"></div>
      <div class="item-list" id="journal-list"></div>
    </div>

    <!-- Settings Section -->
    <div class="admin-section" id="section-settings">
      <div class="section-toolbar">
        <h2>Site Settings</h2>
      </div>
      <div id="settings-form-container"></div>
    </div>

    <!-- About Section -->
    <div class="admin-section" id="section-about">
      <div class="section-toolbar">
        <h2>About Us Page</h2>
      </div>
      <div id="about-form-container"></div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="js/admin.js"></script>
</body>
</html>
